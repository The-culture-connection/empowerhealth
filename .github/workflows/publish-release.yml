name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - 'prod-v*'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Parse pubspec.yaml
        id: parse-version
        run: |
          # Find pubspec.yaml (assuming it's in the root or a subdirectory)
          PUBSPEC_FILE=$(find . -name "pubspec.yaml" -type f | head -n 1)
          
          if [ -z "$PUBSPEC_FILE" ]; then
            echo "Error: pubspec.yaml not found"
            exit 1
          fi
          
          # Extract version line
          VERSION_LINE=$(grep "^version:" "$PUBSPEC_FILE" || echo "")
          if [ -z "$VERSION_LINE" ]; then
            echo "Error: version line not found in pubspec.yaml"
            exit 1
          fi
          
          echo "version_line=$VERSION_LINE" >> $GITHUB_OUTPUT
          
          # Extract version components
          VERSION=$(echo "$VERSION_LINE" | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)/\1+\2/')
          VERSION_NAME=$(echo "$VERSION_LINE" | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)/\1/')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)/\2/')
          
          echo "full_version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Get commit SHA
        id: commit-info
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          BRANCH=$(echo "${{ github.ref }}" | sed 's/refs\/heads\///' | sed 's/refs\/tags\///')
          GIT_TAG=""
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            GIT_TAG=$(echo "${{ github.ref }}" | sed 's/refs\/tags\///')
          fi
          
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "git_tag=$GIT_TAG" >> $GITHUB_OUTPUT

      - name: Load feature dossier
        id: feature-dossier
        run: |
          # Look for feature dossier JSON file (adjust path as needed)
          DOSSIER_FILE=$(find . -name "feature-dossier.json" -o -name "feature_dossier.json" | head -n 1)
          
          if [ -z "$DOSSIER_FILE" ]; then
            echo "Warning: feature dossier file not found, using empty dossier"
            echo 'dossier_json={"summary":"","categories":[]}' >> $GITHUB_OUTPUT
          else
            DOSSIER_JSON=$(cat "$DOSSIER_FILE")
            # Escape JSON for GitHub Actions
            DOSSIER_JSON_ESCAPED=$(echo "$DOSSIER_JSON" | jq -c .)
            echo "dossier_json<<EOF" >> $GITHUB_OUTPUT
            echo "$DOSSIER_JSON_ESCAPED" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Determine environment
        id: environment
        run: |
          if [[ "${{ github.ref }}" == refs/tags/prod-v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "channel=production" >> $GITHUB_OUTPUT
          else
            echo "environment=pilot" >> $GITHUB_OUTPUT
            echo "channel=pilot" >> $GITHUB_OUTPUT
          fi

      - name: Get Railway deployment info
        id: railway-info
        run: |
          # If Railway deployment info is available via environment variables or API
          # Otherwise, set defaults
          echo "deployment_id=" >> $GITHUB_OUTPUT
          echo "deployment_url=" >> $GITHUB_OUTPUT
          echo "deployment_status=success" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          npm install -g firebase-tools
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Process feature changes
        id: process-features
        run: |
          cd admindash
          # Read FEATURES.md content
          FEATURES_CONTENT=$(cat FEATURES.md)
          # Escape for JSON
          FEATURES_JSON=$(echo "$FEATURES_CONTENT" | jq -Rs .)
          
          # Get commit info
          COMMIT_DATE=$(git log -1 --format=%ci "${{ steps.commit-info.outputs.commit_sha }}" | cut -d' ' -f1)
          COMMIT_AUTHOR=$(git log -1 --format=%an "${{ steps.commit-info.outputs.commit_sha }}")
          COMMIT_MESSAGE=$(git log -1 --format=%B "${{ steps.commit-info.outputs.commit_sha }}" | jq -Rs .)
          
          # Call Cloud Function to process features
          firebase functions:call processFeatureChanges \
            --data "{
              \"commitSha\": \"${{ steps.commit-info.outputs.commit_sha }}\",
              \"commitMessage\": $COMMIT_MESSAGE,
              \"commitDate\": \"$COMMIT_DATE\",
              \"commitAuthor\": \"$COMMIT_AUTHOR\",
              \"featuresMarkdown\": $FEATURES_JSON,
              \"secretToken\": \"${{ secrets.FIREBASE_FUNCTIONS_SECRET_TOKEN }}\"
            }" \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true  # Don't fail if features haven't changed

      - name: Get commit details for release
        id: commit-details
        run: |
          COMMIT_SHA="${{ steps.commit-info.outputs.commit_sha }}"
          COMMIT_MESSAGE=$(git log -1 --format=%B "$COMMIT_SHA" | jq -Rs .)
          COMMIT_AUTHOR=$(git log -1 --format=%an "$COMMIT_SHA")
          COMMIT_DATE=$(git log -1 --format=%ci "$COMMIT_SHA" | cut -d' ' -f1)
          
          echo "commit_message=$COMMIT_MESSAGE" >> $GITHUB_OUTPUT
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Call publishRelease Cloud Function
        run: |
          # Call the Cloud Function with codebase flag
          firebase functions:call publishRelease \
            --data '{
              "pubspecVersionLine": "${{ steps.parse-version.outputs.version_line }}",
              "commitSha": "${{ steps.commit-info.outputs.commit_sha }}",
              "branch": "${{ steps.commit-info.outputs.branch }}",
              "gitTag": "${{ steps.commit-info.outputs.git_tag }}",
              "featureDossierJson": ${{ steps.feature-dossier.outputs.dossier_json }},
              "environment": "${{ steps.environment.outputs.environment }}",
              "commitMessage": ${{ steps.commit-details.outputs.commit_message }},
              "commitAuthor": "${{ steps.commit-details.outputs.commit_author }}",
              "commitDate": "${{ steps.commit-details.outputs.commit_date }}",
              "railwayDeployment": {
                "deploymentId": "${{ steps.railway-info.outputs.deployment_id }}",
                "deploymentUrl": "${{ steps.railway-info.outputs.deployment_url }}",
                "status": "${{ steps.railway-info.outputs.deployment_status }}",
                "deployedAt": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"
              },
              "secretToken": "${{ secrets.FIREBASE_FUNCTIONS_SECRET_TOKEN }}"
            }' \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --codebase admindashboard
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
