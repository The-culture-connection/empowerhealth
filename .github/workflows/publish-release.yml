name: Publish Release

on:
  push:
    branches:
      - main
    tags:
      - 'prod-v*'

jobs:
  publish-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Parse pubspec.yaml
        id: parse-version
        run: |
          # Find pubspec.yaml (assuming it's in the root or a subdirectory)
          PUBSPEC_FILE=$(find . -name "pubspec.yaml" -type f | head -n 1)
          
          if [ -z "$PUBSPEC_FILE" ]; then
            echo "Error: pubspec.yaml not found"
            exit 1
          fi
          
          # Extract version line
          VERSION_LINE=$(grep "^version:" "$PUBSPEC_FILE" || echo "")
          if [ -z "$VERSION_LINE" ]; then
            echo "Error: version line not found in pubspec.yaml"
            exit 1
          fi
          
          echo "version_line=$VERSION_LINE" >> $GITHUB_OUTPUT
          
          # Extract version components
          VERSION=$(echo "$VERSION_LINE" | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)/\1+\2/')
          VERSION_NAME=$(echo "$VERSION_LINE" | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)/\1/')
          BUILD_NUMBER=$(echo "$VERSION_LINE" | sed -E 's/version:\s*([0-9]+\.[0-9]+\.[0-9]+)\+([0-9]+)/\2/')
          
          echo "full_version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT

      - name: Get commit SHA
        id: commit-info
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          BRANCH=$(echo "${{ github.ref }}" | sed 's/refs\/heads\///' | sed 's/refs\/tags\///')
          GIT_TAG=""
          
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            GIT_TAG=$(echo "${{ github.ref }}" | sed 's/refs\/tags\///')
          fi
          
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "git_tag=$GIT_TAG" >> $GITHUB_OUTPUT

      - name: Load feature dossier
        id: feature-dossier
        run: |
          # Look for feature dossier JSON file (adjust path as needed)
          DOSSIER_FILE=$(find . -name "feature-dossier.json" -o -name "feature_dossier.json" | head -n 1)
          
          if [ -z "$DOSSIER_FILE" ]; then
            echo "Warning: feature dossier file not found, using empty dossier"
            echo '{"summary":"","categories":[]}' | jq -c . > dossier_temp.json
          else
            cat "$DOSSIER_FILE" | jq -c . > dossier_temp.json
          fi
          # Store as base64 to avoid JSON escaping issues (compatible with both Linux and macOS)
          DOSSIER_B64=$(base64 -w 0 dossier_temp.json 2>/dev/null || base64 dossier_temp.json | tr -d '\n')
          echo "dossier_b64=$DOSSIER_B64" >> $GITHUB_OUTPUT
          rm -f dossier_temp.json

      - name: Determine environment
        id: environment
        run: |
          if [[ "${{ github.ref }}" == refs/tags/prod-v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "channel=production" >> $GITHUB_OUTPUT
          else
            echo "environment=pilot" >> $GITHUB_OUTPUT
            echo "channel=pilot" >> $GITHUB_OUTPUT
          fi

      - name: Get Railway deployment info
        id: railway-info
        run: |
          # If Railway deployment info is available via environment variables or API
          # Otherwise, set defaults
          echo "deployment_id=" >> $GITHUB_OUTPUT
          echo "deployment_url=" >> $GITHUB_OUTPUT
          echo "deployment_status=success" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: |
          npm install -g firebase-tools
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Process feature changes
        id: process-features
        run: |
          cd admindash
          # Read FEATURES.md content
          FEATURES_CONTENT=$(cat FEATURES.md)
          # Escape for JSON
          FEATURES_JSON=$(echo "$FEATURES_CONTENT" | jq -Rs .)
          
          # Get commit info
          COMMIT_DATE=$(git log -1 --format=%ci "${{ steps.commit-info.outputs.commit_sha }}" | cut -d' ' -f1)
          COMMIT_AUTHOR=$(git log -1 --format=%an "${{ steps.commit-info.outputs.commit_sha }}")
          COMMIT_MESSAGE=$(git log -1 --format=%B "${{ steps.commit-info.outputs.commit_sha }}" | jq -Rs .)
          
          # Prepare request payload
          REQUEST_BODY=$(jq -n \
            --arg commitSha "${{ steps.commit-info.outputs.commit_sha }}" \
            --argjson commitMessage "$COMMIT_MESSAGE" \
            --arg commitDate "$COMMIT_DATE" \
            --arg commitAuthor "$COMMIT_AUTHOR" \
            --argjson featuresMarkdown "$FEATURES_JSON" \
            --arg secretToken "${{ secrets.FIREBASE_FUNCTIONS_SECRET_TOKEN }}" \
            '{
              "data": {
                "commitSha": $commitSha,
                "commitMessage": $commitMessage,
                "commitDate": $commitDate,
                "commitAuthor": $commitAuthor,
                "featuresMarkdown": $featuresMarkdown,
                "secretToken": $secretToken
              }
            }')
          
          # Call Cloud Function via HTTPS endpoint using curl
          curl -X POST \
            "https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/processFeatureChanges" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.FIREBASE_TOKEN }}" \
            -d "$REQUEST_BODY" || true
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        continue-on-error: true  # Don't fail if features haven't changed

      - name: Get commit details for release
        id: commit-details
        run: |
          COMMIT_SHA="${{ steps.commit-info.outputs.commit_sha }}"
          COMMIT_MESSAGE=$(git log -1 --format=%B "$COMMIT_SHA" | jq -Rs .)
          COMMIT_AUTHOR=$(git log -1 --format=%an "$COMMIT_SHA")
          COMMIT_DATE=$(git log -1 --format=%ci "$COMMIT_SHA" | cut -d' ' -f1)
          
          # Store commit message as base64 to avoid JSON escaping issues (compatible with both Linux and macOS)
          COMMIT_MESSAGE_B64=$(echo "$COMMIT_MESSAGE" | base64 -w 0 2>/dev/null || echo "$COMMIT_MESSAGE" | base64 | tr -d '\n')
          echo "commit_message_b64=$COMMIT_MESSAGE_B64" >> $GITHUB_OUTPUT
          echo "commit_author=$COMMIT_AUTHOR" >> $GITHUB_OUTPUT
          echo "commit_date=$COMMIT_DATE" >> $GITHUB_OUTPUT

      - name: Call publishRelease Cloud Function
        run: |
          # Decode base64 values (compatible with both Linux and macOS)
          DOSSIER_JSON=$(echo "${{ steps.feature-dossier.outputs.dossier_b64 }}" | base64 -d 2>/dev/null || echo "${{ steps.feature-dossier.outputs.dossier_b64 }}" | base64 -D)
          COMMIT_MESSAGE=$(echo "${{ steps.commit-details.outputs.commit_message_b64 }}" | base64 -d 2>/dev/null || echo "${{ steps.commit-details.outputs.commit_message_b64 }}" | base64 -D)
          
          # Verify JSON is valid before using with --argjson
          if ! echo "$DOSSIER_JSON" | jq . > /dev/null 2>&1; then
            echo "Error: Invalid dossier JSON after decoding"
            exit 1
          fi
          if ! echo "$COMMIT_MESSAGE" | jq . > /dev/null 2>&1; then
            echo "Error: Invalid commit message JSON after decoding"
            exit 1
          fi
          
          # Prepare Railway deployment data
          RAILWAY_DEPLOYMENT=$(jq -n \
            --arg deploymentId "${{ steps.railway-info.outputs.deployment_id }}" \
            --arg deploymentUrl "${{ steps.railway-info.outputs.deployment_url }}" \
            --arg status "${{ steps.railway-info.outputs.deployment_status }}" \
            --arg deployedAt "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            '{
              "deploymentId": $deploymentId,
              "deploymentUrl": $deploymentUrl,
              "status": $status,
              "deployedAt": $deployedAt
            }')
          
          # Prepare request payload using jq with proper JSON handling
          REQUEST_DATA=$(jq -n \
            --arg versionLine "${{ steps.parse-version.outputs.version_line }}" \
            --arg commitSha "${{ steps.commit-info.outputs.commit_sha }}" \
            --arg branch "${{ steps.commit-info.outputs.branch }}" \
            --arg gitTag "${{ steps.commit-info.outputs.git_tag }}" \
            --argjson dossier "$DOSSIER_JSON" \
            --arg environment "${{ steps.environment.outputs.environment }}" \
            --argjson commitMessage "$COMMIT_MESSAGE" \
            --arg commitAuthor "${{ steps.commit-details.outputs.commit_author }}" \
            --arg commitDate "${{ steps.commit-details.outputs.commit_date }}" \
            --argjson railwayDeployment "$RAILWAY_DEPLOYMENT" \
            --arg secretToken "${{ secrets.FIREBASE_FUNCTIONS_SECRET_TOKEN }}" \
            '{
              "data": {
                "pubspecVersionLine": $versionLine,
                "commitSha": $commitSha,
                "branch": $branch,
                "gitTag": $gitTag,
                "featureDossierJson": $dossier,
                "environment": $environment,
                "commitMessage": $commitMessage,
                "commitAuthor": $commitAuthor,
                "commitDate": $commitDate,
                "railwayDeployment": $railwayDeployment,
                "secretToken": $secretToken
              }
            }')
          
          # Call Cloud Function via HTTPS endpoint using curl
          curl -X POST \
            "https://us-central1-${{ secrets.FIREBASE_PROJECT_ID }}.cloudfunctions.net/publishRelease" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.FIREBASE_TOKEN }}" \
            -d "$REQUEST_DATA"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
